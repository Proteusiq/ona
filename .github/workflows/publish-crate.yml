# Publishes the crate to crates.io when a version tag is pushed.
#
# This workflow complements `release.yml` (generated by `dist`), which
# handles building binaries, GitHub Releases, and the Homebrew tap.
#
# Requires a repository secret named `CARGO_REGISTRY_TOKEN` containing
# a crates.io API token scoped to publish `ona`.
# Create the token at https://crates.io/me, then add it at:
#   Settings → Secrets and variables → Actions → New repository secret

name: Publish to crates.io

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    # Skip prereleases (e.g. v0.1.0-rc.1). Remove this `if` to publish them too.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v6

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Verify crate builds and tests pass
        run: cargo test --locked --all-features

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --no-verify
